# Ensure rule file exitsts
- name: Check if audit rule file exists
  ansible.builtin.stat:
    path: "{{ rhel9STIG_stigrule_etc_audit_rules_d_audit_rules_cprcfile }}"
  register: audit_dir_stat
# Make audit rules file with correct permissions
- name: Build audit rule file if not exists
  ansible.builtin.file:
    path: "{{ rhel9STIG_stigrule_etc_audit_rules_d_audit_rules_cprcfile }}"
    mode: '0640'
    owner: root
    group: root
    state: touch
  when: not audit_dir_stat.stat.exists
# Remove legacy RedHat files which are not in the desired order and do not satisfy stig requirements.
- name: Removing old Red Hat audit rules
  ansible.builtin.file:
    path: '/etc/audit/rules.d/{{ item }}'
    state: absent
  loop: "{{ rhel9STIG_stigrule_etc_audit_rules_old_rhel_files_list }}"
  ignore_errors: yes
# Remove legacy RedHat lines which cause parsing errors.
- name: Remove legacy audit rule lines
  ansible.builtin.lineinfile:
    path: "{{ rhel9STIG_stigrule_etc_audit_rules_d_audit_rules_cprcfile }}"
    regexp: '^auditctl -w /etc/cron.d/ -p wa -k cronjobs$'
    state: absent
  notify: auditd_restart
- name: Remove legacy audit rule lines
  ansible.builtin.lineinfile:
    path: "{{ rhel9STIG_stigrule_etc_audit_rules_d_audit_rules_cprcfile }}"
    regexp: '^auditctl -w /var/spool/cron/ -p wa -k cronjobs$'
    state: absent
  notify: auditd_restart
