## Rolling reboot process for Elastic

- name: Disable shard allocation for the Elastic cluster
  ansible.builtin.uri:
    url: "https://masternode1:9200/_cluster/settings"
    return_content: true
    method: PUT
    body_format: json
    body:
      persistent:
        cluster.routing.allocation.enable: "primaries"
    headers:
     Authorization: "ApiKey {{ elastic_key }}"
  retries: 3
  delay: 5
  register: shard_disable_res
  when: "'es-nodes' in group_names"

- name: Stop indexing and perform a flush
  ansible.builtin.uri:
    url: "https://masternode1:9200/_flush"
    return_content: true
    method: POST
    headers:
      Authorization: "ApiKey {{ elastic_key }}"
  retries: 5
  delay: 10
  when: "'es-nodes' in group_names"

- name: Stop elasticsearch service
  service:
    name: elasticsearch
    state: stopped
  register: agent_status
  until: agent_status.state == "stopped"
  retries: 2
  delay: 5
  when: "'es-nodes' in group_names and 'es-nfs-nodes' not in group_names"

