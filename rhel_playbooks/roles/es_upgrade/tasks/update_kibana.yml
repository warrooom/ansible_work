- name: Stop kibana service
  service:
    name: kibana
    state: stopped
  register: agent_status
  until: agent_status.state == "stopped"
  retries: 2
  delay: 5

- name: Copy rpm local
  ansible.builtin.copy:
    src: "kibana-{{ elastic_upgrade_kibana_rpm_version }}-x86_64.rpm"
    dest: /opt/
    mode: '0644'

- name: Install kibana when version differs
  ansible.builtin.dnf:
    name: "/opt/kibana-{{ elastic_upgrade_kibana_rpm_version }}-x86_64.rpm"
    state: present

- name: Remove rpm local
  ansible.builtin.file:
    path: "/opt/kibana-{{ elastic_upgrade_kibana_rpm_version }}-x86_64.rpm"
    state: absent

- name: Ensure kibana is enabled and running
  service:
    name: kibana
    state: started
    enabled: yes
  register: agent_status
  until: agent_status.state == "started"
  retries: 6
  delay: 10
